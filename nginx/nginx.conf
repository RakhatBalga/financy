# Reverse proxy for the Telegram webhook.
# Telegram requires HTTPS in production — terminate TLS here (add a 443 server
# block with your certificate) and proxy to the bot-app upstream.

upstream bot_app {
    server bot-app:8080;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 1m;

    location /healthz {
        proxy_pass http://bot_app/healthz;
    }

    # Webhook path must match WEBHOOK_PATH in .env.
    location /webhook {
        proxy_pass http://bot_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Telegram-Bot-Api-Secret-Token $http_x_telegram_bot_api_secret_token;
    }
}
